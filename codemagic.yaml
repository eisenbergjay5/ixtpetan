workflows:
  ios-testflight:
    name: IXT Pétanque Club iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ixt.petanqueclub
      vars:
        XCODE_PROJECT: "IXTPetanqueClub/IXTPetanqueClub.xcodeproj"
        XCODE_SCHEME: "IXTPetanqueClub"
        BUNDLE_ID: "com.ixt.petanqueclub"
        APP_STORE_APPLE_ID: "6775163240"
        APPLE_TEAM_ID: "7J7RF4D7KY"
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/Library/Caches/org.swift.swiftpm
        - $HOME/Library/Developer/Xcode/DerivedData

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Show Xcode version
        script: xcodebuild -version

      - name: Resolve Swift packages
        script: |
          xcodebuild -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -resolvePackageDependencies

      - name: Validate Debug simulator build
        script: |
          xcodebuild -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Validate Release device build
        script: |
          xcodebuild -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT"
          xcodebuild -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -showBuildSettings \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            | grep -E "DEVELOPMENT_TEAM|CODE_SIGN_STYLE|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE|PRODUCT_BUNDLE_IDENTIFIER"

      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/IXTPetanqueClub"
          BUILD_NUMBER="$(date +%Y%m%d%H%M)"
          if [ -n "$APP_STORE_APPLE_ID" ]; then
            LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || echo 0)
            BUILD_NUMBER=$(("$LATEST_BUILD_NUMBER" + 1))
          fi
          echo "Using CFBundleVersion=$BUILD_NUMBER"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "DEVELOPMENT_TEAM=$APPLE_TEAM_ID"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  unsigned-ios-simulator-build:
    name: Unsigned iOS Simulator Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "IXTPetanqueClub/IXTPetanqueClub.xcodeproj"
        XCODE_SCHEME: "IXTPetanqueClub"
      xcode: latest

    scripts:
      - name: Resolve Swift packages
        script: |
          xcodebuild -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -resolvePackageDependencies

      - name: Build without Apple Developer signing
        script: |
          xcodebuild build \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
