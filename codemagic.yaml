workflows:
  ios-testflight:
    name: IXT Pétanque Club iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ixt.petanqueclub
      vars:
        XCODE_PROJECT: "IXTPetanqueClub/IXTPetanqueClub.xcodeproj"
        XCODE_SCHEME: "IXTPetanqueClub"
        BUNDLE_ID: "com.ixt.petanqueclub"
        APP_STORE_APPLE_ID: "6775163240"
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Show Xcode version
        script: xcodebuild -version

      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT"

      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/IXTPetanqueClub"
          BUILD_NUMBER="$(date +%Y%m%d%H%M)"
          if [ -n "$APP_STORE_APPLE_ID" ]; then
            LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || echo 0)
            BUILD_NUMBER=$(("$LATEST_BUILD_NUMBER" + 1))
          fi
          echo "Using CFBundleVersion=$BUILD_NUMBER"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Verify IPA signature
        script: |
          IPA_PATH=$(find "$CM_BUILD_DIR/build/ios/ipa" -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found"
            exit 1
          fi
          rm -rf /tmp/ipa-check
          mkdir -p /tmp/ipa-check
          unzip -q "$IPA_PATH" -d /tmp/ipa-check
          APP_PATH=$(find /tmp/ipa-check/Payload -name "*.app" -maxdepth 1 | head -n 1)
          echo "IPA: $IPA_PATH"
          echo "APP: $APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH"
          security cms -D -i "$APP_PATH/embedded.mobileprovision" > /tmp/ipa-check/profile.plist
          /usr/libexec/PlistBuddy -c "Print :Name" /tmp/ipa-check/profile.plist
          /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/ipa-check/profile.plist
          /usr/libexec/PlistBuddy -c "Print :Entitlements:aps-environment" /tmp/ipa-check/profile.plist || true

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
